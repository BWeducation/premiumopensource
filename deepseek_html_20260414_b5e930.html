function toast(msg, type){ let el=document.createElement('div'); el.className='toast'+(type?' '+type:''); el.textContent=msg; document.getElementById('tos').appendChild(el); setTimeout(()=>el.remove(), 3200); }
function el(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]); }

function load(){ try{ users=JSON.parse(localStorage.getItem(KU)||'{}'); }catch{ users={}; } try{ cur=JSON.parse(localStorage.getItem(KC)||'null'); }catch{ cur=null; } try{ let b=localStorage.getItem(KB); if(b) activeBg=b; }catch{} }
function su(){ localStorage.setItem(KU, JSON.stringify(users)); }
function sc(){ localStorage.setItem(KC, JSON.stringify(cur)); }
function sb(u){ localStorage.setItem(KB, u); }
function mkUser(n){ return {username:n, background:BG[0].url, coins:100, level:1, avatar:null, inventory:[], inbox:[], profileEffect:'blue', resetOnLoad:false}; }

function refreshBar(){ el('buname').textContent = cur ? cur.username : 'Guest'; el('bcoins').textContent = cur ? (cur.coins||0) : '0'; el('blv').textContent = cur ? (cur.level||1) : '1'; }
function refreshBanner(){ if(!cur){ $ubn.style.display='none'; return; } $ubn.style.display='flex'; $bn.textContent=cur.username; $bavw.innerHTML=cur.avatar?'<img class="bav" src="'+cur.avatar+'">':'<div class="bavp">👤</div>'; }

function applyBg(url, skipSave){
  $stc.classList.toggle('on', url===SV);
  if(url===SV){ stopSurfer(); $bga.style.backgroundImage='none'; $bgb.style.backgroundImage='none'; startSurfer(); }
  else { stopSurfer(); if(!bgFlip){ $bgb.style.backgroundImage="url('"+url+"')"; $bgb.style.opacity='1'; $bga.style.opacity='0'; } else { $bga.style.backgroundImage="url('"+url+"')"; $bga.style.opacity='1'; $bgb.style.opacity='0'; } bgFlip=!bgFlip; }
  activeBg=url; if(!skipSave) sb(url); if(cur){ cur.background=url; users[cur.username]=cur; su(); sc(); }
}
function stopSurfer(){ if(sfAF) cancelAnimationFrame(sfAF); $svc.style.display='none'; sfOn=false; }
function startSurfer(){ stopSurfer(); $svc.style.display='block'; sfOn=true; let ctx=$svc.getContext('2d'),W,H,t=0; function resize(){ W=$svc.width=innerWidth; H=$svc.height=innerHeight; } window.addEventListener('resize',resize); resize(); (function draw(){ if(!sfOn)return; ctx.clearRect(0,0,W,H); for(let i=0;i<4;i++){ ctx.beginPath(); let o=i*75+t*0.07; for(let x=0;x<=W;x+=18){ let y=H/2+95*Math.sin(x*0.006+o)+55*Math.cos(x*0.003+t*0.014); x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fillStyle='hsla('+(212+i*14)+',78%,65%,'+(0.08-i*0.011)+')'; ctx.fill(); } t++; sfAF=requestAnimationFrame(draw); })(); }

function showLogin(){

  initPicker('lpick');
  document.getElementById('l-signin').onclick = ()=>{
    let n = el('l-name').value.trim();
    if(!n) return toast('Enter username','er');

    afterLogin();

    u.background = activeBg;

    users[n] = u;
    su();
    cur = u;
    sc();

function openProxy(url){
  let win = document.createElement('div'); win.className='fw';
  win.innerHTML = `<div class="wb"><span class="wt">🌐 Browser</span><div class="wc"><button class="wb-btn re">↺</button><button class="wb-btn fs">⤢</button><button class="wb-btn cl">✕</button></div></div><div class="wco"><div class="wld"><div class="spin"></div><p>Loading…</p></div><div class="wer"><div class="ei">🔒</div><h3>Could not load</h3><p>Try opening in a new tab.</p><button class="btn sm pr" id="w-nt">Open in new tab ↗</button></div><iframe src="${url}" allow="fullscreen; autoplay; clipboard-write" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-pointer-lock allow-downloads"></iframe></div>`;
  document.body.appendChild(win);
  let iframe=win.querySelector('iframe'), loading=win.querySelector('.wld'), errDiv=win.querySelector('.wer'), loaded=false;
  win.querySelector('.wb-btn.cl').onclick=()=>win.remove();
  win.querySelector('.wb-btn.fs').onclick=()=>{ if(win.requestFullscreen) win.requestFullscreen(); };
  win.querySelector('.wb-btn.re').onclick=()=>{ errDiv.classList.remove('show'); loading.classList.remove('gone'); loaded=false; iframe.src=iframe.src; startTimer(); };
  win.querySelector('#w-nt').onclick=()=>window.open(url,'_blank');
  function startTimer(){ let to=setTimeout(()=>{ if(!loaded){ loading.classList.add('gone'); errDiv.classList.add('show'); } }, 12000); iframe.addEventListener('load',()=>{ clearTimeout(to); },{once:true}); }
  iframe.addEventListener('load',()=>{ loaded=true; loading.classList.add('gone'); });
  iframe.addEventListener('error',()=>{ loading.classList.add('gone'); errDiv.classList.add('show'); });
  startTimer();
  makeDraggable(win);
}
function makeDraggable(win){ let bar=win.querySelector('.wb'), ox=0,oy=0,drag=false; bar.addEventListener('mousedown',e=>{ drag=true; let r=win.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top; e.preventDefault(); }); document.addEventListener('mousemove',e=>{ if(!drag) return; win.style.left=(e.clientX-ox)+'px'; win.style.top=(e.clientY-oy)+'px'; }); document.addEventListener('mouseup',()=>{ drag=false; }); }

(function(){ let c=$stc,ctx=c.getContext('2d'),W,H,stars=[]; function resize(){ W=c.width=innerWidth; H=c.height=innerHeight; stars=Array.from({length:Math.floor(W*H/3200)},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+.5,s:.06+Math.random()*.28,a:Math.random()*Math.PI*2,tw:.004+Math.random()*.009})); } function draw(){ if(!c.classList.contains('on')){ requestAnimationFrame(draw); return; } ctx.clearRect(0,0,W,H); ctx.fillStyle='#fff'; stars.forEach(s=>{ s.x+=s.s*.18; s.a+=s.tw; if(s.x>W+10){s.x=-5;s.y=Math.random()*H;} ctx.globalAlpha=.38+.35*Math.sin(s.a); ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); }); ctx.globalAlpha=1; requestAnimationFrame(draw); } window.addEventListener('resize',resize); resize(); draw(); })();
